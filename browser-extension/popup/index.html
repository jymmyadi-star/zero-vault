<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Zero Vault</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      min-height: 300px;
      max-height: 500px;
      font-family: 'Courier New', Courier, monospace;
      background: #0a0a0f;
      color: #e0e0e0;
      overflow-x: hidden;
    }
    .container { padding: 16px; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .logo { font-size: 16px; font-weight: 900; color: #00F0FF; letter-spacing: 4px; }
    .status { font-size: 10px; color: #666; margin-left: auto; }
    .status.locked { color: #FF3B30; }
    .status.unlocked { color: #34C759; }
    .btn {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
    }
    .btn-primary { background: #00F0FF; color: #000; font-weight: 900; border: none; }
    .btn:hover { opacity: 0.85; }
    .search { width: 100%; padding: 10px 14px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; background: rgba(255,255,255,0.03); color: #fff; font-family: inherit; font-size: 13px; outline: none; }
    .search:focus { border-color: #00F0FF; }
    .item-list { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow-y: auto; }
    .item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
    }
    .item:hover { background: rgba(255,255,255,0.06); }
    .item-title { font-size: 13px; font-weight: 600; }
    .item-sub { font-size: 10px; color: #888; margin-top: 2px; }
    .item-actions { display: flex; gap: 6px; }
    .icon-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 16px; padding: 4px; }
    .icon-btn:hover { color: #fff; }
    .empty { text-align: center; padding: 30px 0; color: #666; font-size: 12px; }
    .error { text-align: center; padding: 30px 0; color: #FF3B30; font-size: 12px; }
    .mnemonic-input { width: 100%; min-height: 60px; padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); color: #fff; font-family: inherit; font-size: 12px; resize: vertical; margin-bottom: 12px; }
    .hint { font-size: 10px; color: #666; margin-bottom: 12px; text-align: center; }
    .copied { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); background: #34C759; color: #000; padding: 8px 20px; border-radius: 20px; font-size: 12px; font-weight: 700; opacity: 0; transition: opacity 0.2s; }
    .copied.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">Z//VAULT</div>
      <div id="status" class="status locked">LOCKED</div>
    </div>
    <div id="content"></div>
    <div id="copied" class="copied">COPIED</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
