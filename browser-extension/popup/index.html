<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Zero Vault</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --zv-bg: #030305;
      --zv-surface: rgba(15, 15, 25, 0.4);
      --zv-border: rgba(255, 255, 255, 0.03);
      --zv-highlight: rgba(0, 240, 255, 0.15);
      --zv-cyan: #00F0FF;
      --zv-text: #FFFFFF;
      --zv-text-muted: #8E8E93;
      --zv-danger: #FF2A55;
    }

    body {
      width: 380px;
      height: 520px;
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--zv-bg);
      color: var(--zv-text);
      overflow: hidden;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    /* The Void Singularity Background */
    .singularity-core {
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(0, 240, 255, 0.05), transparent 40%),
                  radial-gradient(circle at 20% 80%, rgba(138, 43, 226, 0.05), transparent 40%);
      animation: rotateCore 30s linear infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes rotateCore {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .container { 
      padding: 24px; 
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header { 
      display: flex; 
      align-items: center; 
      justify-content: space-between;
      margin-bottom: 28px; 
      position: relative;
      z-index: 2;
    }
    .logo { 
      font-size: 14px; 
      font-weight: 900; 
      letter-spacing: 4px; 
      background: linear-gradient(90deg, #FFFFFF, var(--zv-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
      filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.3));
    }
    
    .status-container {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--zv-surface);
      padding: 6px 14px;
      border-radius: 30px;
      border: 1px solid var(--zv-border);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      transition: all 0.5s ease;
    }
    .status-dot.secured { 
      background: var(--zv-cyan); 
      box-shadow: 0 0 12px var(--zv-cyan), 0 0 4px #FFF; 
    }
    .status-dot.locked { 
      background: var(--zv-danger); 
      box-shadow: 0 0 12px var(--zv-danger); 
      animation: pulseAlert 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes pulseAlert {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    .status-text { font-size: 9px; font-weight: 800; letter-spacing: 2px; color: var(--zv-text-muted); }

    /* Liquid Glass Panels */
    .glass-panel {
      position: relative;
      background: var(--zv-surface);
      border: 1px solid var(--zv-border);
      border-radius: 24px;
      padding: 30px 24px;
      backdrop-filter: blur(40px) saturate(150%);
      -webkit-backdrop-filter: blur(40px) saturate(150%);
      box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
      z-index: 2;
    }

    /* Inputs */
    .input-field {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.05);
      color: var(--zv-text);
      font-family: inherit;
      font-size: 14px;
      padding: 16px 20px;
      border-radius: 16px;
      outline: none;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }
    .input-field::placeholder { color: rgba(255,255,255,0.15); }
    .input-field:focus {
      border-color: rgba(0, 240, 255, 0.4);
      background: rgba(0, 240, 255, 0.02);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.1), inset 0 2px 10px rgba(0,0,0,0.5);
      transform: translateY(-1px);
    }
    .input-mono {
      font-family: 'ui-monospace', monospace;
      letter-spacing: 4px;
      text-align: center;
      font-size: 18px;
    }

    /* Buttons */
    .btn {
      position: relative;
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-primary {
      background: var(--zv-text);
      color: var(--zv-bg);
      border: none;
      box-shadow: 0 10px 30px rgba(255,255,255,0.1);
    }
    .btn-primary:hover { 
      background: var(--zv-cyan); 
      box-shadow: 0 15px 40px rgba(0, 240, 255, 0.3);
      transform: translateY(-2px);
    }
    .btn-primary:active { transform: translateY(1px) scale(0.98); }

    /* Layout Spacing */
    .space-y-6 > * + * { margin-top: 24px; }
    .space-y-4 > * + * { margin-top: 16px; }
    .space-y-2 > * + * { margin-top: 8px; }

    /* Typography */
    .label { font-size: 10px; font-weight: 800; color: var(--zv-text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; padding-left: 4px; }
    .title { font-size: 24px; font-weight: 300; letter-spacing: -1px; margin-bottom: 8px; text-align: center; }
    .desc { font-size: 12px; color: var(--zv-text-muted); line-height: 1.6; text-align: center; font-weight: 400; }

    /* Screens */
    .screen {
      display: none;
      flex-direction: column;
      flex: 1;
      animation: screenEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .screen.active { display: flex; }
    @keyframes screenEnter {
      from { opacity: 0; transform: translateY(20px) scale(0.98); filter: blur(10px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    /* Vault Item List */
    .item-list { 
      display: flex; 
      flex-direction: column; 
      gap: 10px; 
      flex: 1;
      overflow-y: auto; 
      overflow-x: hidden;
      margin-bottom: 10px;
      /* Add padding to prevent clipping when children scale on hover */
      padding: 8px 12px 8px 8px; 
      /* Negative margin to compensate for padding so scrollbar stays at the edge */
      margin-left: -8px;
      margin-right: -4px;
      margin-top: -8px;
      z-index: 2;
    }
    .item-list::-webkit-scrollbar { width: 4px; }
    .item-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    .item-card {
      display: flex; 
      align-items: center; 
      padding: 16px; 
      border-radius: 16px;
      background: var(--zv-surface);
      /* Using box-shadow instead of border to prevent Chrome overflow:hidden corner clipping bug */
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
      margin: 2px; /* Breathing room for hover scaling */
    }
    /* The Sweep effect */
    .item-card::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transform: skewX(-20deg); transition: 0s;
    }
    .item-card:hover { 
      background: rgba(255,255,255,0.06); 
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.15);
    }
    .item-card:hover::after { left: 200%; transition: 0.8s ease-in-out; }
    
    .item-icon-wrapper {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: center;
      margin-right: 16px;
      font-size: 18px;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
      transition: all 0.3s ease;
    }
    .item-card:hover .item-icon-wrapper {
      background: rgba(0, 240, 255, 0.1);
      border-color: rgba(0, 240, 255, 0.3);
      color: var(--zv-cyan);
    }

    .item-content { flex: 1; overflow: hidden; }
    .item-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--zv-text); }
    .item-sub { font-size: 11px; color: var(--zv-text-muted); font-weight: 400; }
    
    .item-actions { display: flex; gap: 8px; opacity: 0; transform: translateX(10px); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .item-card:hover .item-actions { opacity: 1; transform: translateX(0); }
    
    .icon-btn { 
      background: rgba(0,0,0,0.3); 
      border: 1px solid rgba(255,255,255,0.05); 
      color: var(--zv-text-muted); 
      cursor: pointer; 
      border-radius: 10px;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s;
    }
    .icon-btn svg { width: 14px; height: 14px; fill: currentColor; }
    .icon-btn:hover { 
      background: rgba(255,255,255,0.1); 
      color: var(--zv-text);
      transform: scale(1.1); 
    }

    .empty { 
      text-align: center; 
      padding: 80px 0; 
      color: var(--zv-text-muted); 
      font-size: 12px; 
      font-weight: 600;
      letter-spacing: 1px;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }
    .empty svg { width: 64px; height: 64px; opacity: 0.1; }
    .error-msg { color: var(--zv-danger); font-size: 11px; text-align: center; margin-top: 12px; display: none; font-weight: 700; letter-spacing: 1px; }

    /* Modern Toast */
    .toast { 
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(40px) scale(0.8); 
      background: rgba(255,255,255,0.1); 
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(20px);
      color: var(--zv-text); 
      padding: 12px 24px; border-radius: 30px; 
      font-size: 11px; font-weight: 800; letter-spacing: 2px;
      opacity: 0; pointer-events: none; 
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }

    /* Cinematic Decryption Overlay */
    .decryption-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(3,3,5,0.9);
      backdrop-filter: blur(20px);
      z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center;
    }
    .decryption-overlay.active { display: flex; animation: fadeInOverlay 0.4s ease forwards; }
    @keyframes fadeInOverlay { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; backdrop-filter: blur(20px); } }
    
    /* Singularity Loader */
    .spinner {
      width: 60px; height: 60px;
      border: 2px solid rgba(0, 240, 255, 0.1);
      border-top-color: var(--zv-cyan);
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
      box-shadow: 0 0 30px rgba(0,240,255,0.2);
    }
    .spinner::after {
      content: ''; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
      border: 2px solid rgba(255, 255, 255, 0.1); border-bottom-color: #FFF; border-radius: 50%;
      animation: spin 2s linear infinite reverse;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .decrypt-text { 
      margin-top: 24px; font-family: 'ui-monospace', monospace; font-size: 11px; font-weight: 800; letter-spacing: 4px; 
      color: var(--zv-cyan); text-shadow: 0 0 10px rgba(0,240,255,0.5);
      animation: pulseText 2s infinite alternate;
    }
    @keyframes pulseText { 0% { opacity: 0.5; } 100% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="singularity-core"></div>
  <div class="container">
    <div class="header">
      <div class="logo">ZERO VAULT</div>
      <div class="status-container" id="status-container">
        <div class="status-dot locked" id="status-dot"></div>
        <div class="status-text" id="status-text">LOCKED</div>
      </div>
    </div>
    
    <!-- Pairing Screen -->
    <div id="screen-pairing" class="screen">
      <div class="glass-panel space-y-6">
        <div>
          <h1 class="title">Secure Link</h1>
          <p class="desc">Connect extension to your mobile vault.</p>
        </div>
        
        <div class="space-y-4">
          <div class="space-y-2">
            <label class="label">Vault Seed (24 Words)</label>
            <textarea id="pairing-id-input" class="input-field input-mono" placeholder="Enter your 24-word master seed..." autocomplete="off" spellcheck="false" style="height: 100px; resize: none; font-size: 12px; line-height: 1.6;"></textarea>
          </div>
          <div class="space-y-2">
            <label class="label">Create Local PIN</label>
            <input type="password" id="pairing-pin-input" class="input-field input-mono" placeholder="••••••" maxlength="12" autocomplete="off" />
          </div>
        </div>
        
        <button id="btn-pair" class="btn btn-primary">Establish Link</button>
        <div id="pair-error" class="error-msg">Invalid pairing ID.</div>
      </div>
    </div>

    <!-- Unlock Screen -->
    <div id="screen-unlock" class="screen">
      <div class="glass-panel space-y-6" style="margin-top: 40px;">
        <div>
          <h1 class="title">Vault Locked</h1>
          <p class="desc">Enter your master PIN to decrypt memory.</p>
        </div>
        
        <div class="space-y-2">
          <input type="password" id="pin-input" class="input-field input-mono" placeholder="••••••" maxlength="12" style="font-size: 28px; padding: 20px;" autocomplete="off" />
        </div>
        
        <button id="btn-unlock" class="btn btn-primary">Decrypt</button>
        <div id="unlock-error" class="error-msg">Cryptographic verification failed.</div>
      </div>
    </div>

    <!-- Vault Screen -->
    <div id="screen-vault" class="screen">
      <div class="space-y-4" style="margin-bottom: 20px;">
        <input type="text" id="search-input" class="input-field" placeholder="Search entries..." autocomplete="off" style="border-radius: 20px; background: rgba(0,0,0,0.5);" />
      </div>
      <div id="item-list" class="item-list">
        <!-- Rendered by popup.ts -->
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">COPIED TO CLIPBOARD</div>
    
    <!-- Decryption Cinematic -->
    <div id="decryption-overlay" class="decryption-overlay">
      <div class="spinner"></div>
      <div class="decrypt-text">DECRYPTING MEMORY</div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
