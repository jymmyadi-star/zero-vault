name: CI — Zero Vault

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-client:
    name: Type Check — Client
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'npm' }
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit

  typecheck-server:
    name: Type Check — Server
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'npm' }
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit -p server/tsconfig.json

  typecheck-extension:
    name: Type Check — Extension
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'npm' }
      - run: npm ci --legacy-peer-deps
      - run: cd browser-extension && npm ci && npx tsc --noEmit

  test:
    name: Tests (client + server)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'npm' }
      - run: npm ci --legacy-peer-deps
      - run: npm test

  build-server:
    name: Build — Server Docker
    needs: [typecheck-server, test]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: zerovault-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-extension:
    name: Build — Browser Extension
    needs: [typecheck-extension]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'npm' }
      - run: cd browser-extension && npm ci && node build.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: browser-extension
          path: browser-extension/dist/
