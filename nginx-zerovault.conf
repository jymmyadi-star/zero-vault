# /etc/nginx/sites-available/zerovault
# Place this on your AWS server, then run:
#   sudo ln -s /etc/nginx/sites-available/zerovault /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#   sudo certbot --nginx -d 13-61-144-124.nip.io

server {
    listen 80;
    server_name 13-61-144-124.nip.io;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }
}

# After certbot runs, it auto-adds the HTTPS server block below.
# The WebSocket upgrade headers are already configured above for ws→wss support.
